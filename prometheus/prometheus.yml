global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Flask app metrics
  - job_name: 'flask'
    static_configs:
      - targets: ['web:5000']
    metrics_path: '/metrics'

  # System metrics via Node Exporter
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
